seed: 123
output_dir: results/imagenet_vgg19_smoothgrad
dataset:
  name: imagenet
  root: ./imagenet
  normalization: imagenet
  image_size: 224
model:
  name: vgg19
  pretrained: true
checkpoint: results/imagenet_vgg19/best.pt
train:
  batch_size: 64
  lr: 0.0001
  epochs: 1
  num_workers: 8
test:
  num_seeds: 100
finetune:
  epochs: 10
bayeswarp:
  saliency_method: smoothgrad
  alpha: 0.1
  area_min: 250
  tau_iou: 0.3
  d_max: 6
  rho: 0.6
  S: 32
  eta: 0.1
  beta: 0.03
  epsilon: 0.005
  kappa: 1.0
  n: 4
  m: 256
  per_class_budget: 10
  max_target_classes: null
